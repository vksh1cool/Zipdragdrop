# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = "zipdragdrop"
primary_region = "ams"

[build]

[deploy]
  strategy = "immediate"

[env]
  PORT = "3000"
  NODE_ENV = "production"
  UPLOAD_DIR = "/app/uploads"

# Single machine setup — this app stores files on a single volume,
# so we must NOT run multiple machines (each would have its own volume).
[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/api/status"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "uploads_data"
  destination = "/app/uploads"
  initial_size = "1gb"
