name = "zip-drop"
main = "src/index.js"
compatibility_date = "2024-01-01"

# R2 bucket binding for file storage
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "zip-drop-files"

# KV namespace for metadata
[[kv_namespaces]]
binding = "METADATA"
id = "your_kv_namespace_id"

[vars]
MAX_FILE_SIZE = 1073741824  # 1GB in bytes
